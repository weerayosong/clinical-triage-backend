# ==========================================
# DATABASE CONNECTION DETAILS
# ==========================================
# Configure JDBC URL, username, and password
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA AND HIBERNATE CONFIGURATION
# ==========================================
# Automatically update database schema to match entity models
spring.jpa.hibernate.ddl-auto=update

# Enable SQL logging in the console for debugging purposes
spring.jpa.show-sql=true

# Format SQL output for better readability
spring.jpa.properties.hibernate.format_sql=true

# Specify the database dialect for PostgreSQL
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false

# ==========================================
# SERVER CONFIGURATION
# ==========================================
# Define the application listening port
server.port=8080